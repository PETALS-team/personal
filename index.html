<script>
const FACTORS = [
  {key:'p', name:'Productivity', prompt:'How much did you get done that actually mattered?', low:'Stuck', high:'On top of it', hints:["Couldn't get much off the ground","Slow progress, lots of friction","Got through some things, not as much as I hoped","Made solid progress on what mattered","Felt really on top of everything"]},
  {key:'e', name:'Enjoyment', prompt:'How much did you enjoy the work itself?', low:'A slog', high:'Loved it', hints:["Really struggled to find anything to enjoy","Hard to find motivation most of the time","Work was fine, nothing really stood out","Genuinely enjoyed most of what I worked on","Loved what I was working on"]},
  {key:'t', name:'Teamwork', prompt:'How connected did you feel to the people around you?', low:'Alone', high:'In sync', hints:["Felt disconnected or isolated from the team","Collaboration felt difficult or strained","Team interactions were okay, nothing special","Worked well with the team","Team felt completely in sync"]},
  {key:'l', name:'Learning', prompt:'How much did you learn or grow this week?', low:'In circles', high:'Breakthroughs', hints:["Felt stuck, going in circles","Little new ground covered","Picked something up, nothing major","Learned something genuinely useful","Had some real breakthrough moments"]},
  {key:'s', name:'Serenity', prompt:'How calm and settled did you feel?', low:'Frazzled', high:'At ease', hints:["Felt overwhelmed and under constant pressure","Under pressure more than felt comfortable","Manageable, but not really relaxed","Mostly calm and focused","Felt settled and in the zone"]}
];
const COLORS = {1:'#F24822',2:'#FFA629',3:'#FFCD29',4:'#BBCC00',5:'#14AE5C'};
// Core brand colours, pulled from the five petal fills in the PETALS logo mark.
const BRAND = {purple:'#D8B4FE', lime:'#C1FF72', yellow:'#FFDE59', pink:'#FF66C4', teal:'#68CFB7'};
const MESSAGES = {1:"Tough week. Sharing how you really feel is the bravest thing you can do.",2:"A hard week, but naming it honestly is the first step.",3:"A mixed week, the most honest kind. Worth talking about.",4:"A solid week. Your team would find your perspective valuable.",5:"A great week. Your team would love to know that."};
const STICKERS = {1:'OOF',2:'ROUGH',3:'MIXED',4:'SOLID',5:'BLOOMING'};
const DIVERGE = {
  p:{theirs:"They felt more productive. What slowed you down?", yours:"You felt more productive. What helped you focus?"},
  e:{theirs:"They found more to enjoy. What is energising them?", yours:"You found more enjoyment. What was different for them?"},
  t:{theirs:"They felt more connected. Did something leave you isolated?", yours:"You felt more in sync. Did they struggle to collaborate?"},
  l:{theirs:"They learned more. What could you pick up from them?", yours:"You had a bigger learning week. What could you share?"},
  s:{theirs:"They felt calmer. Were you carrying more pressure than needed?", yours:"You felt more settled. What kept you calm?"}
};
const EMPTY_PETAL = '#efe7d3';

let state = defaultState();
let advanceTimer = null, copyTimer = null;

function defaultState(){
  return {screen:'intro', mode:'solo', step:0, scores:{p:0,e:0,t:0,l:0,s:0}, theirScores:null, revealCount:0, tab:'individuals', copied:false, shared:false, advancing:false};
}

function mean(o){ return (o.p+o.e+o.t+o.l+o.s)/5; }
function textOn(n){ return (n===1||n===5) ? '#fff' : '#141414'; }
function fmt(v){ return Number.isInteger(v) ? String(v) : v.toFixed(1); }
function curFactor(){ return FACTORS[Math.min(state.step,4)]; }
function curVal(){ return state.scores[curFactor().key] || 0; }
function factorName(k){ return FACTORS.find(f=>f.key===k).name; }

function buildFlower(opts){
  const scores = opts.scores || {p:0,e:0,t:0,l:0,s:0};
  const revealed = opts.revealed == null ? 6 : opts.revealed;
  const showScores = opts.showScores !== false;
  const labels = !!opts.labels;
  const defs = [
    {k:'p', cx:218, cy:90,  lx:218, ly:-8,  a:'middle'},
    {k:'e', cx:346, cy:202, lx:432, ly:150, a:'end'},
    {k:'t', cx:298, cy:331, lx:352, ly:442, a:'middle'},
    {k:'l', cx:154, cy:331, lx:104, ly:442, a:'middle'},
    {k:'s', cx:90,  cy:202, lx:12,  ly:150, a:'start'}
  ];
  let petalsHtml = '', numsHtml = '', labelsHtml = '';
  defs.forEach((d,i)=>{
    const v = scores[d.k] || 0;
    const on = i < revealed && v > 0;
    const rv = Math.round(v);
    const fill = on ? COLORS[rv] : EMPTY_PETAL;
    petalsHtml += `<circle cx="${d.cx}" cy="${d.cy}" r="86" fill="${fill}" stroke="#141414" stroke-width="5" style="transition:fill .35s ease"></circle>`;
    if(on && showScores){
      numsHtml += `<text x="${d.cx}" y="${d.cy}" text-anchor="middle" dominant-baseline="central" fill="${textOn(rv)}" style="font-family:'Lilita One',cursive;font-size:42px">${fmt(v)}</text>`;
    }
    if(labels){
      labelsHtml += `<text x="${d.lx}" y="${d.ly}" text-anchor="${d.a}" style="font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;fill:#141414;letter-spacing:.5px">${factorName(d.k)}</text>`;
    }
  });
  const avgRaw = mean(scores);
  const centerOn = revealed >= 6 && avgRaw > 0;
  const ca = Math.round(avgRaw);
  const centerFill = centerOn ? COLORS[ca] : EMPTY_PETAL;
  const centerNum = (centerOn && showScores)
    ? `<text x="218" y="218" text-anchor="middle" dominant-baseline="central" fill="${textOn(ca)}" style="font-family:'Lilita One',cursive;font-size:34px">${avgRaw.toFixed(1)}</text>`
    : '';
  return `<svg viewBox="0 0 456 452" style="width:100%;height:auto;display:block;overflow:visible">
    <g transform="translate(6 8)">
      ${labelsHtml}
      ${petalsHtml}
      <circle cx="218" cy="218" r="86" fill="${centerFill}" stroke="#141414" stroke-width="5" style="transition:fill .35s ease"></circle>
      ${numsHtml}
      ${centerNum}
    </g>
  </svg>`;
}

function render(){
  const app = document.getElementById('app');
  if(state.screen === 'intro') app.innerHTML = renderIntro();
  else if(state.screen === 'checkin') app.innerHTML = renderCheckin();
  else if(state.screen === 'reveal') app.innerHTML = renderReveal();
  else if(state.screen === 'compareLanding') app.innerHTML = renderCompareLanding();
  else if(state.screen === 'compareResult') app.innerHTML = renderCompareResult();
}

function introStep(n,bg,tc,text){
  return `<div style="display:flex;align-items:center;gap:14px;background:#fff;border:3px solid #141414;border-radius:12px;padding:13px 15px;box-shadow:4px 4px 0 #141414">
    <span style="flex:none;width:34px;height:34px;border-radius:50%;background:${bg};border:2.5px solid #141414;font-family:'Lilita One',cursive;color:${tc};display:flex;align-items:center;justify-content:center;font-size:17px">${n}</span>
    <span style="font-size:14.5px;font-weight:600;line-height:1.3">${text}</span>
  </div>`;
}

function renderIntro(){
  return `
  <div class="pt-rise" style="max-width:460px;margin:0 auto">
    <div style="font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#8a8266;margin-bottom:10px">Weekly check-in</div>
    <h1 style="font-family:'Lilita One',cursive;font-size:44px;line-height:.98;margin:0 0 16px">How was your<br>week, <span style="background:#FFCD29;padding:0 8px;border:3px solid #141414;box-shadow:4px 4px 0 #141414;display:inline-block;transform:rotate(-1.5deg)">really?</span></h1>
    <p style="font-size:16px;line-height:1.5;font-weight:500;color:#3a352a;margin:0 0 26px">One honest minute. Five quick questions, one at a time. At the end your week blooms into a flower you can share with your team.</p>
    <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:28px">
      ${introStep(1,'#F24822','#fff','Rate five parts of your week from 1 to 5.')}
      ${introStep(2,'#FFCD29','#141414','Watch your flower bloom, petal by petal.')}
      ${introStep(3,'#14AE5C','#fff','Share it and compare with a teammate.')}
    </div>
    <button class="pt-press" onclick="petalsStart()" style="width:100%;background:#14AE5C;color:#fff;border:3px solid #141414;border-radius:12px;padding:17px;font-family:'Lilita One',cursive;font-size:21px;cursor:pointer;box-shadow:5px 5px 0 #141414">Start my check-in</button>
    <div style="text-align:center;font-size:13px;font-weight:500;color:#8a8266;margin-top:12px">Takes about a minute. Nothing is saved anywhere.</div>
  </div>`;
}

function renderCheckin(){
  const cf = curFactor();
  const cv = curVal();
  const segs = FACTORS.map((f,i)=> state.scores[f.key]>0 ? COLORS[state.scores[f.key]] : (i===state.step ? '#141414' : '#fff'));

  const dotsHtml = [1,2,3,4,5].map(v=>{
    const sel = cv===v;
    const dim = cv!==0 && !sel;
    const size = sel?60:48;
    const fs = sel?24:19;
    const tc = (v===1||v===5) ? '#fff' : '#141414';
    const shadow = sel ? '4px 4px 0 #141414' : '0 0 0 #141414';
    const op = dim ? 0.35 : 1;
    return `<button class="pt-dot" onclick="petalsSelectScore(${v})" aria-label="${cf.name} score ${v}" style="flex:none;width:${size}px;height:${size}px;border-radius:50%;background:${COLORS[v]};border:3px solid #141414;cursor:pointer;font-family:'Lilita One',cursive;font-size:${fs}px;color:${tc};display:flex;align-items:center;justify-content:center;padding:0;opacity:${op};box-shadow:${shadow};transition:transform .15s,opacity .15s,box-shadow .15s,width .15s,height .15s">${v}</button>`;
  }).join('');

  const hint = cv ? cf.hints[cv-1] : 'Tap a dot to score.';
  const hintOp = cv ? 1 : 0.45;

  return `
  <div style="max-width:460px;margin:0 auto">
    ${state.mode==='compare' ? '<div style="text-align:center;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#14AE5C;margin-bottom:14px">Your turn to check in</div>' : ''}
    <div style="display:flex;gap:7px;margin-bottom:26px">
      ${segs.map(bg=>`<span style="flex:1;height:9px;border-radius:20px;border:2px solid #141414;background:${bg}"></span>`).join('')}
    </div>
    <div class="pt-rise" style="animation:pt-rise .32s ease both">
      <div style="font-family:'Lilita One',cursive;font-size:13px;color:#8a8266;letter-spacing:1px;margin-bottom:6px">Question ${state.step+1} of 5</div>
      <h2 style="font-family:'Lilita One',cursive;font-size:40px;line-height:1;margin:0 0 10px;color:${cv?COLORS[cv]:'#141414'}">${cf.name}</h2>
      <p style="font-size:16.5px;line-height:1.45;font-weight:500;color:#3a352a;margin:0 0 30px;min-height:48px">${cf.prompt}</p>
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:14px">${dotsHtml}</div>
      <div style="display:flex;justify-content:space-between;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#8a8266;margin-bottom:22px">
        <span>${cf.low}</span><span>${cf.high}</span>
      </div>
      <div style="min-height:56px;background:#fff;border:3px solid #141414;border-radius:12px;padding:14px 16px;box-shadow:4px 4px 0 #141414;display:flex;align-items:center;opacity:${hintOp};transition:opacity .2s">
        <span style="font-size:15px;font-weight:600;font-style:italic;color:#3a352a">${hint}</span>
      </div>
    </div>
    <button onclick="petalsBack()" style="margin-top:20px;background:none;border:none;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:#8a8266;cursor:pointer;padding:6px">&larr; Back</button>
  </div>`;
}

function renderReveal(){

  const done = state.revealCount >= 6;

    }).join('');
    doneBlock = `
    <div class="pt-rise">
      <div style="display:flex;align-items:center;gap:14px;margin-top:20px;background:#141414;border:3px solid #141414;border-radius:14px;padding:14px 18px;box-shadow:6px 6px 0 #14AE5C">
        <div style="font-family:'Lilita One',cursive;font-size:46px;line-height:.9;color:#fff">${avgRaw.toFixed(1)}</div>
        <div style="font-family:'Lilita One',cursive;font-size:11px;letter-spacing:1px;line-height:1.35;color:#cbb">WEEKLY<br>AVERAGE</div>
        <div style="margin-left:auto;font-family:'Lilita One',cursive;font-size:14px;background:${COLORS[floorA]};color:${(floorA===1||floorA===5)?'#fff':'#141414'};border:2.5px solid #fff;border-radius:6px;padding:7px 11px;transform:rotate(-3deg)">${STICKERS[floorA]}</div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:16px">${chips}</div>

      <div style="margin-top:22px;background:#FFCD29;border:3px solid #141414;border-radius:16px;padding:18px;box-shadow:6px 6px 0 #141414">
        <div style="font-family:'Lilita One',cursive;font-size:20px;margin-bottom:4px">Share your flower</div>
        <p style="font-size:13.5px;font-weight:600;color:#5c5330;margin:0 0 14px">Send this to a teammate. They score their own week, then you see both flowers side by side.</p>
        <div style="display:flex;gap:8px;margin-bottom:12px">

          <button class="pt-press" onclick="petalsCopy()" style="flex:none;background:#141414;color:#fff;border:2.5px solid #141414;border-radius:9px;padding:0 16px;font-family:'Lilita One',cursive;font-size:14px;cursor:pointer;box-shadow:3px 3px 0 #14AE5C">${state.copied?'Copied!':'Copy'}</button>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="pt-press" onclick="petalsShareX()" style="flex:1;min-width:120px;display:flex;align-items:center;justify-content:center;gap:8px;background:#fff;border:2.5px solid #141414;border-radius:9px;padding:11px;font-family:'Space Grotesk',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer;box-shadow:3px 3px 0 #141414"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.742l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>Post on X</button>
          <button class="pt-press" onclick="petalsShareIn()" style="flex:1;min-width:120px;display:flex;align-items:center;justify-content:center;gap:8px;background:#fff;border:2.5px solid #141414;border-radius:9px;padding:11px;font-family:'Space Grotesk',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer;box-shadow:3px 3px 0 #141414"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>LinkedIn</button>
          <button class="pt-press" onclick="petalsSaveImage()" style="flex:1;min-width:120px;display:flex;align-items:center;justify-content:center;gap:8px;background:#fff;border:2.5px solid #141414;border-radius:9px;padding:11px;font-family:'Space Grotesk',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer;box-shadow:3px 3px 0 #141414"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Save</button>
        </div>
        ${state.shared ? `<div style="margin-top:12px;background:#14AE5C;border:2.5px solid #141414;border-radius:10px;padding:12px 14px;font-size:13px;font-weight:600;color:#fff;line-height:1.45">You are one of the brave ones. <a href="https://usepetals.com/account/join?promo=anniversary3" target="_blank" rel="noopener" style="color:#fff;text-decoration:underline">Claim 3 months free on PETALS Plus &rarr;</a></div>` : ''}
      </div>

      <button class="pt-press" onclick="petalsPreviewCompare()" style="width:100%;margin-top:16px;background:#fff;color:#141414;border:3px solid #141414;border-radius:12px;padding:14px;font-family:'Lilita One',cursive;font-size:17px;cursor:pointer;box-shadow:5px 5px 0 #141414">See how comparing works &rarr;</button>
      <button onclick="petalsRestart()" style="width:100%;margin-top:12px;background:none;border:none;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:#8a8266;cursor:pointer;padding:6px">Score another week</button>

function renderCompareLanding(){
  const flowerHtml = buildFlower({scores:state.theirScores, revealed:6, showScores:false});
  return `
  <div class="pt-rise" style="max-width:460px;margin:0 auto">
    <div style="font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#8a8266;margin-bottom:10px">A teammate shared their week</div>
    <h1 style="font-family:'Lilita One',cursive;font-size:38px;line-height:1;margin:0 0 14px">Score yours first,<br>then compare</h1>
    <p style="font-size:15.5px;line-height:1.5;font-weight:500;color:#3a352a;margin:0 0 22px">Their flower stays hidden until your own scores are in. Honest first, comparison second, that is the whole point.</p>
    <div style="position:relative;background:#fff;border:3px solid #141414;border-radius:16px;padding:22px;box-shadow:6px 6px 0 #141414;overflow:hidden">
      <div style="filter:blur(9px);opacity:.85;pointer-events:none">${flowerHtml}</div>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
        <span style="font-family:'Lilita One',cursive;font-size:15px;background:#141414;color:#fff;border-radius:8px;padding:9px 15px;transform:rotate(-3deg);box-shadow:4px 4px 0 #FFCD29">HIDDEN FOR NOW</span>
      </div>
    </div>
    <button class="pt-press" onclick="petalsStartCompareOwn()" style="width:100%;margin-top:22px;background:#14AE5C;color:#fff;border:3px solid #141414;border-radius:12px;padding:17px;font-family:'Lilita One',cursive;font-size:20px;cursor:pointer;box-shadow:5px 5px 0 #141414">Start my check-in</button>
  </div>`;
}

function renderCompareResult(){
  const their = state.theirScores || {p:0,e:0,t:0,l:0,s:0};
  const mine = state.scores;
  const origAvg = mean(their);
  const recipAvg = mean(mine);
  const diff = Math.abs(origAvg - recipAvg);
  const headline = diff<=0.5 ? 'Your weeks were remarkably similar' : (diff<=1.5 ? 'A few differences worth talking about' : 'Some real contrasts this week');
  const done = state.revealCount >= 6;

  const tabsHtml = `
    <button onclick="petalsSwitchTab('individuals')" style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;padding:11px 22px;border:3px solid #141414;border-radius:10px 0 0 10px;margin-left:0;cursor:pointer;background:${state.tab==='individuals'?'#141414':'#fff'};color:${state.tab==='individuals'?'#fff':'#141414'}">Individuals</button>
    <button onclick="petalsSwitchTab('team')" style="font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;padding:11px 22px;border:3px solid #141414;border-radius:0 10px 10px 0;margin-left:-3px;cursor:pointer;background:${state.tab==='team'?'#141414':'#fff'};color:${state.tab==='team'?'#fff':'#141414'}">Team flower</button>`;

  let bodyHtml = '';
  if(state.tab === 'individuals'){
    const theirFlower = buildFlower({scores:their, revealed:state.revealCount, showScores:true});
    const myFlower = buildFlower({scores:mine, revealed:state.revealCount, showScores:true});
    let doneBlock = '';
    if(done){
      const analysis = [];
      const divStyle = "border:2.5px solid #141414;border-left:8px solid #FFA629;border-radius:10px;background:rgba(255,166,41,.14);padding:12px 15px;font-size:14px;font-weight:500;line-height:1.45;color:#3a352a";
      const accStyle = "border:2.5px solid #141414;border-left:8px solid #14AE5C;border-radius:10px;background:rgba(20,174,92,.12);padding:12px 15px;font-size:14px;font-weight:500;line-height:1.45;color:#3a352a";
      FACTORS.forEach(f=>{
        const gap = their[f.key] - mine[f.key];
        if(Math.abs(gap) >= 2) analysis.push({label:f.name+'. ', body: gap>0 ? DIVERGE[f.key].theirs : DIVERGE[f.key].yours, style:divStyle});
      });
      FACTORS.forEach(f=>{
        if(their[f.key] === mine[f.key] && mine[f.key] >= 4) analysis.push({label:f.name+'. ', body:'You both rated it '+mine[f.key]+'/5. That shared high point is worth celebrating.', style:accStyle});
      });
      if(analysis.length === 0) analysis.push({label:'', body:'Your scores are close across the board, a sign of real alignment.', style:accStyle});
      doneBlock = `
      <div class="pt-rise" style="margin-top:20px">
        <div style="font-family:'Lilita One',cursive;font-size:20px;margin-bottom:12px">What stands out</div>
        <div style="display:flex;flex-direction:column;gap:10px">
          ${analysis.map(a=>`<div style="${a.style}"><b>${a.label}</b>${a.body}</div>`).join('')}
        </div>
        <button class="pt-press" onclick="petalsSwitchTab('team')" style="width:100%;margin-top:20px;background:#14AE5C;color:#fff;border:3px solid #141414;border-radius:12px;padding:15px;font-family:'Lilita One',cursive;font-size:18px;cursor:pointer;box-shadow:5px 5px 0 #141414">Merge into your team flower &rarr;</button>
      </div>`;
    }
    bodyHtml = `
    <div>
      <div class="petals-grid2" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div style="background:#fff;border:3px solid #141414;border-radius:16px;padding:16px 12px;box-shadow:5px 5px 0 #141414;text-align:center">
          <div style="font-family:'Lilita One',cursive;font-size:12px;letter-spacing:1px;color:#8a8266;margin-bottom:8px">THEIR WEEK</div>
          ${theirFlower}
          <div style="font-family:'Lilita One',cursive;font-size:32px;margin-top:8px">${origAvg.toFixed(1)}</div>
          <div style="font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#8a8266">Average</div>
        </div>
        <div style="background:#fff;border:3px solid #141414;border-radius:16px;padding:16px 12px;box-shadow:5px 5px 0 #141414;text-align:center">
          <div style="font-family:'Lilita One',cursive;font-size:12px;letter-spacing:1px;color:#14AE5C;margin-bottom:8px">YOUR WEEK</div>
          ${myFlower}
          <div style="font-family:'Lilita One',cursive;font-size:32px;margin-top:8px">${recipAvg.toFixed(1)}</div>
          <div style="font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#8a8266">Average</div>
        </div>
      </div>
      ${doneBlock}
    </div>`;
  } else {
    const merged = {};
    FACTORS.forEach(f=> merged[f.key] = (their[f.key] + mine[f.key]) / 2);
    const teamAvg = mean(merged);
    const teamFlower = buildFlower({scores:merged, revealed:6, showScores:true});
    const teamChips = FACTORS.map(f=>{
      const v = merged[f.key]; const rv = Math.round(v); const col = COLORS[rv]||'#ccc'; const tc = (rv===1||rv===5)?'#fff':'#141414';
      const disp = Number.isInteger(v) ? v : v.toFixed(1);
      return `<span style="font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:5px 11px;border-radius:20px;border:2.5px solid #141414;background:${col};color:${tc}">${f.name} ${disp}</span>`;
    }).join('');
    bodyHtml = `
    <div class="pt-rise" style="max-width:460px;margin:0 auto">
      <div style="background:#fff;border:3px solid #141414;border-radius:16px;padding:20px 16px;box-shadow:6px 6px 0 #141414;text-align:center">
        <div style="font-family:'Lilita One',cursive;font-size:13px;letter-spacing:1px;color:#8a8266;margin-bottom:8px">YOUR TEAM'S WEEK</div>
        ${teamFlower}
        <div style="font-family:'Lilita One',cursive;font-size:40px;margin-top:10px">${teamAvg.toFixed(1)}</div>
        <div style="font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#8a8266">Team average</div>
        <div style="display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:16px">${teamChips}</div>
      </div>
      <div style="margin-top:20px;background:#F24822;border:3px solid #141414;border-radius:16px;padding:20px;box-shadow:6px 6px 0 #141414;color:#fff">
        <div style="font-family:'Lilita One',cursive;font-size:22px;line-height:1.05;margin-bottom:8px">Do this every week, together</div>
        <p style="font-size:14.5px;font-weight:500;line-height:1.5;margin:0 0 16px;color:#fff">One honest check-in opens conversations that months of meetings miss. PETALS makes reflection a weekly habit your whole team shares.</p>
        <a href="https://usepetals.com/account/join?promo=anniversary3" target="_blank" rel="noopener" class="pt-press-y" style="display:inline-block;background:#141414;color:#fff;border:2.5px solid #141414;border-radius:10px;padding:13px 22px;font-family:'Lilita One',cursive;font-size:17px;text-decoration:none;box-shadow:4px 4px 0 #BBCC00">Start with your team</a>
      </div>
      <button onclick="petalsRestart()" style="width:100%;margin-top:14px;background:none;border:none;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;color:#8a8266;cursor:pointer;padding:6px">Score another week</button>
    </div>`;
  }

  return `
  <div style="max-width:720px;margin:0 auto">
    <h1 style="font-family:'Lilita One',cursive;font-size:32px;line-height:1.02;text-align:center;margin:0 auto 20px;max-width:560px">${headline}</h1>
    <div style="display:flex;justify-content:center;margin-bottom:22px">${tabsHtml}</div>
    ${bodyHtml}
  </div>`;
}

/* ---------- actions ---------- */

function petalsStart(){
  state.screen='checkin'; state.mode='solo'; state.step=0;
  state.scores={p:0,e:0,t:0,l:0,s:0}; state.revealCount=0; state.advancing=false;
  render();
}

function petalsRestart(){
  try{ history.replaceState(null, '', location.pathname + location.search); }catch(e){}
  state = defaultState();
  render();
}

function petalsSelectScore(v){
  if(state.advancing) return;
  state.scores = {...state.scores, [curFactor().key]: v};
  render();
  clearTimeout(advanceTimer);
  state.advancing = true;
  advanceTimer = setTimeout(()=>{ state.advancing = false; petalsNext(); }, 640);
}

function petalsNext(){
  if(state.step < 4){ state.step++; render(); }
  else petalsFinish();
}

function petalsBack(){
  if(state.step > 0){ state.step--; state.advancing = false; render(); }
  else { state.screen = state.mode==='compare' ? 'compareLanding' : 'intro'; render(); }
}

function petalsFinish(){
  state.screen = state.mode==='compare' ? 'compareResult' : 'reveal';
  state.tab = 'individuals';
  state.revealCount = 0;
  render();
  setTimeout(()=>{ state.revealCount = 6; render(); }, 60);
}

function petalsPreviewCompare(){
  state.screen='compareLanding'; state.mode='compare';
  state.theirScores={...state.scores};
  state.scores={p:0,e:0,t:0,l:0,s:0}; state.step=0; state.revealCount=0; state.advancing=false;
  render();
}

function petalsStartCompareOwn(){
  state.screen='checkin'; state.mode='compare'; state.step=0;
  state.scores={p:0,e:0,t:0,l:0,s:0}; state.revealCount=0; state.advancing=false;
  render();
}

function petalsSwitchTab(t){
  state.tab = t;
  render();
}

function petalsShareUrl(){
  return location.href.split('#')[0] + '#compare=' + encodeURIComponent(btoa(JSON.stringify(state.scores)));
}

function petalsCopy(){
  const u = petalsShareUrl();
  if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(u).catch(()=>{});
  state.copied = true; render();
  clearTimeout(copyTimer);
  copyTimer = setTimeout(()=>{ state.copied = false; render(); }, 2000);
}

function petalsTweetText(){
  const s = state.scores;
  const a = mean(s).toFixed(1);
  return "My PETALS week: Productivity "+s.p+"/5, Enjoyment "+s.e+"/5, Teamwork "+s.t+"/5, Learning "+s.l+"/5, Serenity "+s.s+"/5. Average "+a+"/5. How did your week compare? "+petalsShareUrl()+" #PETALS";
}

function petalsShareX(){
  window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(petalsTweetText()),'_blank','width=600,height=420');
  state.shared = true; render();
}

function petalsShareIn(){
  window.open('https://www.linkedin.com/sharing/share-offsite/?url='+encodeURIComponent(petalsShareUrl()),'_blank','width=600,height=600');
  state.shared = true; render();
}

function petalsSaveImage(){
  try{
    const svg = document.querySelector('#petals-reveal-flower svg');
    if(!svg) return;
    const clone = svg.cloneNode(true);
    clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
    let str = new XMLSerializer().serializeToString(clone);
    str = str.replace('>', "><style>text{font-family:Georgia,'Times New Roman',serif;font-weight:bold}</style>");
    const blob = new Blob([str], {type:'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = ()=>{
      const c = document.createElement('canvas'); c.width = 620; c.height = 660;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#fdf3d6'; ctx.fillRect(0,0,620,660);
      ctx.drawImage(img, 40, 30, 540, 540);
      ctx.fillStyle = '#141414'; ctx.font = "bold 20px Georgia, serif"; ctx.textAlign = 'center';
      ctx.fillText('usepetals.com', 310, 630);
      URL.revokeObjectURL(url);
      const a = document.createElement('a'); a.download = 'my-petals-flower.png'; a.href = c.toDataURL('image/png'); a.click();
    };
    img.src = url;
  }catch(e){}
}

/* ---------- init ---------- */

(function init(){
  try{
    const m = (location.hash || '').match(/compare=([^&]+)/);
    if(m){
      const s = JSON.parse(atob(decodeURIComponent(m[1])));
      if(s && s.p && s.e && s.t && s.l && s.s){
        state.screen = 'compareLanding'; state.mode = 'compare'; state.theirScores = s;
      }
    }
  }catch(e){}
  render();
})();
</script>
