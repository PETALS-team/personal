<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PETALS — 3rd Anniversary Check-in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green: #14AE5C;
  --green-d: #108B4A;
  --c1: #F24822; --s1: #C23A1B;
  --c2: #FFA629; --s2: #CC8521;
  --c3: #FFCD29; --s3: #CCA421;
  --c4: #BBCC00; --s4: #9aaa00;
  --c5: #14AE5C; --s5: #108B4A;
  --bg: #edf2f7;
  --card: #fff;
  --muted: #6b7280;
}

body {
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  padding: 24px 16px 48px;
}

h1, h2, h3, .logo { font-family: 'Lilita One', cursive; }

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 560px;
  margin: 0 auto 32px;
}

.logo {
  font-size: 28px;
  color: var(--green);
  letter-spacing: 2px;
}

.anniversary-pill {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 99px;
  background: linear-gradient(135deg, #14AE5C, #108B4A, #0d7a3e);
  color: #fff;
  letter-spacing: 0.5px;
}

.card {
  background: var(--card);
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  max-width: 560px;
  margin: 0 auto 20px;
  padding: 28px 24px;
}

.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 4px;
}

.card-subtitle {
  font-size: 15px;
  color: #374151;
  margin-bottom: 24px;
  line-height: 1.5;
}

.factor-row {
  padding: 14px 0;
  border-bottom: 1px solid #f3f4f6;
  transition: background 0.2s, border-radius 0.2s, padding 0.2s, margin 0.2s;
}
.factor-row:last-child { border-bottom: none; }

.factor-row.scored {
  background: #f0f9f4;
  border: 1px solid #c3e6d4;
  border-radius: 12px;
  padding: 14px 14px;
  margin: 0 -14px;
}

.factor-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}

.factor-name {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  min-width: 90px;
}

.dots {
  display: flex;
  gap: 10px;
}

.dot {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #e5e7eb;
  border: 2.5px solid #d1d5db;
  cursor: pointer;
  transition: transform 0.12s, background 0.15s, border-color 0.15s;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  appearance: none;
}

.dot:hover { transform: scale(1.12); }
.dot:active { transform: scale(0.95); }

.hint {
  font-size: 12px;
  color: var(--green-d);
  margin-top: 8px;
  padding-left: 2px;
  min-height: 18px;
  font-style: italic;
  opacity: 0;
  transition: opacity 0.2s;
}
.hint.visible { opacity: 1; }

.reveal-btn {
  display: block;
  width: 100%;
  max-width: 560px;
  margin: 0 auto 12px;
  padding: 18px 24px;
  font-family: 'Lilita One', cursive;
  font-size: 20px;
  letter-spacing: 0.5px;
  color: #fff;
  background: var(--green);
  border: none;
  border-radius: 40px;
  cursor: pointer;
  transition: background 0.15s, transform 0.12s, opacity 0.2s;
  box-shadow: 0 4px 16px rgba(20,174,92,0.3);
}

.reveal-btn:hover:not(:disabled) { background: var(--green-d); transform: translateY(-1px); }
.reveal-btn:active:not(:disabled) { transform: translateY(0); }
.reveal-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.progress-hint {
  text-align: center;
  font-size: 13px;
  color: var(--muted);
  max-width: 560px;
  margin: 0 auto;
}

.progress-hint.done { color: var(--green); font-weight: 600; }
</style>
</head>
<body>

<header>
  <div class="logo">🌸 PETALS</div>
  <div class="anniversary-pill">3rd Anniversary ✦</div>
</header>

<div class="card">
  <div class="card-title">Weekly Reflection</div>
  <div class="card-subtitle">How was your week, honestly? Score each factor 1–5.</div>

  <div id="factors"></div>
</div>

<button class="reveal-btn" id="revealBtn" disabled onclick="reveal()">Reveal my flower ✦</button>
<div class="progress-hint" id="progressHint">5 factors left</div>

<script>
const FACTORS = [
  { key: 'p', name: 'Productivity', hints: [
    'Couldn\'t get much off the ground',
    'Slow progress, lots of friction',
    'Got through some things, not as much as I\'d hoped',
    'Made solid progress on what mattered',
    'Felt really on top of everything'
  ]},
  { key: 'e', name: 'Enjoyment', hints: [
    'Really struggled to find anything to enjoy',
    'Hard to find motivation most of the time',
    'Work was fine, nothing really stood out',
    'Genuinely enjoyed most of what I worked on',
    'Loved what I was working on'
  ]},
  { key: 't', name: 'Teamwork', hints: [
    'Felt disconnected or isolated from the team',
    'Collaboration felt difficult or strained',
    'Team interactions were okay, nothing special',
    'Worked well with the team',
    'Team felt completely in sync'
  ]},
  { key: 'l', name: 'Learning', hints: [
    'Felt stuck, going in circles',
    'Little new ground covered',
    'Picked something up, nothing major',
    'Learned something genuinely useful',
    'Had some real breakthrough moments'
  ]},
  { key: 's', name: 'Serenity', hints: [
    'Felt overwhelmed and under constant pressure',
    'Under pressure more than felt comfortable',
    'Manageable, but not really relaxed',
    'Mostly calm and focused',
    'Felt settled and in the zone'
  ]}
];

const COLORS = ['', '#F24822', '#FFA629', '#FFCD29', '#BBCC00', '#14AE5C'];
const STROKES = ['', '#C23A1B', '#CC8521', '#CCA421', '#9aaa00', '#108B4A'];

const scores = { p: 0, e: 0, t: 0, l: 0, s: 0 };

function renderFactors() {
  const container = document.getElementById('factors');
  container.innerHTML = '';

  FACTORS.forEach(f => {
    const row = document.createElement('div');
    row.className = 'factor-row';
    row.id = `row-${f.key}`;

    const header = document.createElement('div');
    header.className = 'factor-header';

    const name = document.createElement('div');
    name.className = 'factor-name';
    name.textContent = f.name;

    const dots = document.createElement('div');
    dots.className = 'dots';

    for (let i = 1; i <= 5; i++) {
      const dot = document.createElement('button');
      dot.className = 'dot';
      dot.setAttribute('aria-label', `${f.name} score ${i}`);
      dot.dataset.factor = f.key;
      dot.dataset.value = i;
      dot.addEventListener('click', () => score(f.key, i));
      dots.appendChild(dot);
    }

    const hint = document.createElement('div');
    hint.className = 'hint';
    hint.id = `hint-${f.key}`;

    header.appendChild(name);
    header.appendChild(dots);
    row.appendChild(header);
    row.appendChild(hint);
    container.appendChild(row);
  });
}

function score(key, value) {
  scores[key] = value;

  const row = document.getElementById(`row-${key}`);
  const dots = row.querySelectorAll('.dot');
  const hint = document.getElementById(`hint-${key}`);
  const factor = FACTORS.find(f => f.key === key);

  dots.forEach((dot, i) => {
    const n = i + 1;
    if (n <= value) {
      dot.style.background = COLORS[value];
      dot.style.borderColor = STROKES[value];
    } else {
      dot.style.background = '#e5e7eb';
      dot.style.borderColor = '#d1d5db';
    }
  });

  row.classList.add('scored');
  hint.textContent = factor.hints[value - 1];
  hint.classList.add('visible');

  updateProgress();
}

function updateProgress() {
  const scored = Object.values(scores).filter(v => v > 0).length;
  const left = 5 - scored;
  const hint = document.getElementById('progressHint');
  const btn = document.getElementById('revealBtn');

  if (left === 0) {
    hint.textContent = 'All done — ready to reveal!';
    hint.classList.add('done');
    btn.disabled = false;
  } else {
    hint.textContent = `${left} factor${left !== 1 ? 's' : ''} left`;
    hint.classList.remove('done');
    btn.disabled = true;
  }
}

function reveal() {
  if (Object.values(scores).some(v => v === 0)) return;
  const hash = btoa(JSON.stringify(scores));
  window.location.href = `result.html#${hash}`;
}

renderFactors();
</script>
</body>
</html>
